<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameWork Tic-Tac-Toe - Multiplayer</title>
    <link rel="icon" type="image/x-icon" href="../../favicon.ico">
    <link rel="stylesheet" href="../gamework.css">
</head>
<body>
    <div class="container">
        <h1>⭕ Tic-Tac-Toe</h1>

        <div id="homeView">
            <div class="room-buttons">
                <button id="inviteBtn">Invite Player</button>
                <button id="joinBtn">Join a Game</button>
            </div>
        </div>

        <div id="inviteView" hidden>
            <div class="qr-code" id="qrCodeContainer"></div>
            <div class="room-code" id="roomCode"></div>
            <p class="muted">Waiting for a player to join…</p>
        </div>

        <div id="joinView" hidden>
            <input type="text" id="roomCodeInput" placeholder="Enter room code" maxlength="6" style="text-align: center; letter-spacing: 0.2em;">
            <button id="joinRoomBtn">Join</button>
        </div>

        <div id="gameView" hidden>
            <div class="status" id="status"></div>
            <div class="game-board" id="gameBoard">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
        </div>

        <p class="muted" id="message" hidden></p>
    </div>

     <script type="module">
         import { startTicTacToeGame } from './TicTacToeGame.ts';

         document.addEventListener('DOMContentLoaded', () => {
             startTicTacToeGame();
         });
     </script>
</body>
</html>
