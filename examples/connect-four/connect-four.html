<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameWork Connect Four - Multiplayer</title>
    <link rel="icon" type="image/x-icon" href="../../favicon.ico">
    <link rel="stylesheet" href="../gamework.css">
</head>
<body>
    <a class="back-link" href="../index.html" title="Back to GameWork demos">←</a>

    <div class="container">
        <h1>🔴 Connect Four</h1>

        <div id="homeView">
            <div class="room-buttons">
                <button id="inviteBtn">Invite Player</button>
                <button id="joinBtn">Join a Game</button>
            </div>
        </div>

        <div id="inviteView" hidden>
            <div class="qr-code" id="qrCodeContainer"></div>
            <div class="room-code" id="roomCode"></div>
            <p class="muted">Waiting for a player to join…</p>
        </div>

        <div id="joinView" hidden>
            <input type="text" id="roomCodeInput" placeholder="Enter room code" maxlength="6" style="text-align: center; letter-spacing: 0.2em;">
            <button id="joinRoomBtn">Join</button>
        </div>

        <div id="gameView" hidden>
            <div class="status" id="status"></div>
            <div class="c4-board" id="gameBoard"></div>
            <button id="playAgainBtn" hidden>Play Again</button>
        </div>

        <p class="muted" id="message" hidden></p>
    </div>

     <script type="module">
         import { startConnectFourGame } from './ConnectFourGame.ts';

         document.addEventListener('DOMContentLoaded', () => {
             startConnectFourGame();
         });
     </script>
</body>
</html>
